<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520">
<style>
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @keyframes barGrow{from{width:0}to{width:100%}}
  @keyframes typeCursor{0%,100%{opacity:1}50%{opacity:0}}

  .term-bg{fill:#1a1b26}
  .term-body-bg{fill:#24283b}
  .dot-r{fill:#f7768e}.dot-y{fill:#e0af68}.dot-g{fill:#9ece6a}
  .t-dim{fill:#565f89;font-family:monospace;font-size:12px}
  .t-fg{fill:#c0caf5;font-family:monospace;font-size:12px}
  .t-green{fill:#9ece6a;font-family:monospace;font-size:12px}
  .t-amber{fill:#e0af68;font-family:monospace;font-size:12px}
  .t-blue{fill:#7aa2f7;font-family:monospace;font-size:12px}
  .t-purple{fill:#bb9af7;font-family:monospace;font-size:12px}
  .t-coral{fill:#ff9e64;font-family:monospace;font-size:12px}
  .t-bold{fill:#c0caf5;font-family:monospace;font-size:12px;font-weight:bold}
  .t-title{fill:#565f89;font-family:monospace;font-size:11px}

  .mascot{animation:bob 2.2s ease-in-out infinite}
  .cursor-blink{animation:blink 1s step-end infinite}

  .line-1{opacity:0;animation:fadeIn 0.1s forwards 0.8s}
  .line-2{opacity:0;animation:fadeIn 0.1s forwards 1.0s}
  .line-3{opacity:0;animation:fadeIn 0.1s forwards 1.1s}
  .line-4{opacity:0;animation:fadeIn 0.1s forwards 1.3s}
  .line-5{opacity:0;animation:fadeIn 0.1s forwards 1.5s}
  .line-6{opacity:0;animation:fadeIn 0.1s forwards 1.6s}
  .line-7{opacity:0;animation:fadeIn 0.1s forwards 1.8s}
  .line-8{opacity:0;animation:fadeIn 0.1s forwards 2.0s}
  .line-9{opacity:0;animation:fadeIn 0.1s forwards 2.1s}
  .line-10{opacity:0;animation:fadeIn 0.1s forwards 2.3s}
  .line-11{opacity:0;animation:fadeIn 0.1s forwards 2.5s}
  .line-12{opacity:0;animation:fadeIn 0.1s forwards 2.7s}
  .line-13{opacity:0;animation:fadeIn 0.1s forwards 2.9s}
  .line-14{opacity:0;animation:fadeIn 0.1s forwards 3.1s}
  .line-15{opacity:0;animation:fadeIn 0.1s forwards 3.3s}
  .line-16{opacity:0;animation:fadeIn 0.1s forwards 3.5s}
  .line-17{opacity:0;animation:fadeIn 0.1s forwards 3.7s}
  .line-18{opacity:0;animation:fadeIn 0.1s forwards 3.9s}

  .bar-blue{fill:#7aa2f7}.bar-purple{fill:#bb9af7}.bar-green{fill:#9ece6a}
  .bar-track{fill:#1a1b26}

  .b1{opacity:0;animation:fadeIn 0.3s forwards 3.1s}
  .b2{opacity:0;animation:fadeIn 0.3s forwards 3.3s}
  .b3{opacity:0;animation:fadeIn 0.3s forwards 3.7s}
  .b4{opacity:0;animation:fadeIn 0.3s forwards 3.9s}
  .b5{opacity:0;animation:fadeIn 0.3s forwards 4.1s}

  .speech{opacity:0;animation:fadeIn 0.3s forwards 4.3s}
</style>

<!-- Terminal window -->
<rect class="term-bg" x="0" y="0" width="620" height="520" rx="12"/>

<!-- Title bar -->
<circle class="dot-r" cx="20" cy="18" r="5"/>
<circle class="dot-y" cx="36" cy="18" r="5"/>
<circle class="dot-g" cx="52" cy="18" r="5"/>
<text class="t-title" x="520" y="22">~ claude usage</text>

<!-- Pixel mascot (bobbing) -->
<g class="mascot" transform="translate(280, 38)">
  <!-- body -->
  <rect x="18" y="0" width="36" height="6" fill="#D85A30"/>
  <rect x="12" y="6" width="48" height="6" fill="#D85A30"/>
  <rect x="12" y="12" width="48" height="6" fill="#D85A30"/>
  <rect x="6" y="18" width="60" height="6" fill="#D85A30"/>
  <rect x="6" y="24" width="60" height="6" fill="#D85A30"/>
  <rect x="6" y="30" width="60" height="6" fill="#D85A30"/>
  <rect x="6" y="36" width="60" height="6" fill="#D85A30"/>
  <rect x="12" y="42" width="48" height="6" fill="#D85A30"/>
  <!-- eyes -->
  <rect x="18" y="24" width="12" height="6" fill="#2C2C2A"/>
  <rect x="42" y="24" width="12" height="6" fill="#2C2C2A"/>
  <!-- snout -->
  <rect x="24" y="36" width="24" height="6" fill="#F5C4B3"/>
  <rect x="24" y="42" width="24" height="6" fill="#F5C4B3"/>
  <!-- arms -->
  <rect x="0" y="24" width="6" height="12" fill="#F0997B"/>
  <rect x="66" y="24" width="6" height="12" fill="#F0997B"/>
  <!-- legs -->
  <rect x="12" y="48" width="12" height="12" fill="#D85A30"/>
  <rect x="30" y="48" width="12" height="12" fill="#D85A30"/>
  <rect x="48" y="48" width="12" height="12" fill="#D85A30"/>
</g>

<!-- Speech bubble -->
<g class="speech">
  <rect x="390" y="48" width="140" height="24" rx="8" fill="#24283b" stroke="#565f89" stroke-width="0.5"/>
  <text class="t-green" x="404" y="65" font-size="11">Check your stats!</text>
</g>

<!-- Terminal body -->
<rect class="term-body-bg" x="10" y="105" width="600" height="405" rx="8"/>

<!-- Prompt line -->
<text class="t-green" x="24" y="126">~</text>
<text class="t-fg" x="38" y="126">claude usage</text>
<rect class="cursor-blink" x="122" y="115" width="7" height="14" fill="#c0caf5" opacity="0">
  <animate attributeName="opacity" values="0;0;0;1" dur="0.8s" fill="freeze"/>
  <animate attributeName="opacity" values="1;0;1;0" begin="0.8s" dur="1s" repeatCount="indefinite"/>
</rect>

<!-- Output lines -->
<g class="line-1"><text class="t-bold" x="24" y="150">Claude Code Usage Summary (Mar 1 - Mar 28, 2026)</text></g>
<g class="line-2"><text class="t-dim" x="24" y="164">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text></g>

<g class="line-3"><text class="t-dim" x="24" y="186">  Sessions:</text><text class="t-bold" x="116" y="186">47</text></g>
<g class="line-4"><text class="t-dim" x="24" y="200">  Total cost:</text><text class="t-green" x="116" y="200">$12.34</text></g>
<g class="line-5"><text class="t-dim" x="24" y="214">  Avg/session:</text><text class="t-dim" x="116" y="214">$0.26</text></g>

<g class="line-6"><text class="t-bold" x="24" y="236">  Tokens</text></g>
<g class="line-7"><text class="t-dim" x="24" y="250">    Input:</text><text class="t-fg" x="100" y="250">1,234,567</text><text class="t-dim" x="190" y="250">(cache hit: </text><text class="t-green" x="278" y="250">78%</text><text class="t-dim" x="300" y="250">)</text></g>
<g class="line-8"><text class="t-dim" x="24" y="264">    Output:</text><text class="t-fg" x="108" y="264">456,789</text></g>

<g class="line-9"><text class="t-bold" x="24" y="288">  By model</text></g>

<!-- sonnet bar -->
<g class="line-10">
  <text class="t-blue" x="24" y="304">    sonnet-4</text>
  <text class="t-coral" x="150" y="304">$8.21</text>
  <text class="t-dim" x="200" y="304">(66%)</text>
</g>
<g class="b1">
  <rect class="bar-track" x="250" y="295" width="120" height="10" rx="2"/>
  <rect class="bar-blue" x="250" y="295" width="79" height="10" rx="2"/>
</g>

<!-- opus bar -->
<g class="line-11">
  <text class="t-purple" x="24" y="320">    opus-4</text>
  <text class="t-coral" x="150" y="320">$4.13</text>
  <text class="t-dim" x="200" y="320">(34%)</text>
</g>
<g class="b2">
  <rect class="bar-track" x="250" y="311" width="120" height="10" rx="2"/>
  <rect class="bar-purple" x="250" y="311" width="41" height="10" rx="2"/>
</g>

<g class="line-12"><text class="t-bold" x="24" y="344">  Top projects</text></g>

<!-- project bars -->
<g class="line-13">
  <text class="t-fg" x="24" y="360">    my-app</text>
  <text class="t-coral" x="150" y="360">$5.67</text>
</g>
<g class="b3">
  <rect class="bar-track" x="210" y="351" width="120" height="10" rx="2"/>
  <rect class="bar-green" x="210" y="351" width="55" height="10" rx="2"/>
</g>

<g class="line-14">
  <text class="t-fg" x="24" y="376">    backend</text>
  <text class="t-coral" x="150" y="376">$3.89</text>
</g>
<g class="b4">
  <rect class="bar-track" x="210" y="367" width="120" height="10" rx="2"/>
  <rect class="bar-green" x="210" y="367" width="38" height="10" rx="2"/>
</g>

<g class="line-15">
  <text class="t-fg" x="24" y="392">    scripts</text>
  <text class="t-coral" x="150" y="392">$2.78</text>
</g>
<g class="b5">
  <rect class="bar-track" x="210" y="383" width="120" height="10" rx="2"/>
  <rect class="bar-green" x="210" y="383" width="27" height="10" rx="2"/>
</g>

<!-- Bottom status -->
<g class="line-16">
  <text class="t-dim" x="24" y="420">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
</g>
<g class="line-17">
  <text class="t-dim" x="24" y="440">  Try: </text>
  <text class="t-green" x="64" y="440">--rate-limit</text>
  <text class="t-dim" x="156" y="440">  </text>
  <text class="t-blue" x="168" y="440">--mcp-breakdown</text>
  <text class="t-dim" x="288" y="440">  </text>
  <text class="t-purple" x="300" y="440">--watch</text>
  <text class="t-dim" x="352" y="440">  </text>
  <text class="t-coral" x="364" y="440">--json</text>
</g>
<g class="line-18">
  <text class="t-dim" x="24" y="458">  45 tests passing · zero dependencies · streaming architecture</text>
</g>

<!-- Tabs at bottom -->
<g class="line-18">
  <rect x="24" y="472" width="56" height="20" rx="4" fill="#9ece6a" fill-opacity="0.15"/>
  <text class="t-green" x="32" y="486" font-size="10">usage</text>
  <rect x="88" y="472" width="72" height="20" rx="4" fill="transparent"/>
  <text class="t-dim" x="96" y="486" font-size="10">rate-limit</text>
  <rect x="168" y="472" width="44" height="20" rx="4" fill="transparent"/>
  <text class="t-dim" x="176" y="486" font-size="10">mcp</text>
  <rect x="220" y="472" width="44" height="20" rx="4" fill="transparent"/>
  <text class="t-dim" x="228" y="486" font-size="10">json</text>
  <rect x="272" y="472" width="52" height="20" rx="4" fill="transparent"/>
  <text class="t-dim" x="280" y="486" font-size="10">watch</text>
</g>

</svg>
